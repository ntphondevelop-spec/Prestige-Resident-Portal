<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบลูกบ้าน - Pak Phanang Prestige Hall</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=Audiowide&display=swap" rel="stylesheet">
    
    <script>
        // 🔒 ตรวจสอบ Session ถ้าลูกบ้านล็อกอินค้างไว้ ให้ข้ามไปหน้า Dashboard เลย
        (function() {
            try {
                const sessionStr = localStorage.getItem('tenant_user_data');
                if (sessionStr) {
                    const data = JSON.parse(sessionStr);
                    if (new Date().getTime() <= (data.loggedInAt + data.expiresIn)) {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch(e) {}
        })();
    </script>

    <style>
        :root {
            --font-ui: 'Anuphan', sans-serif;
            --font-logo: 'Audiowide', cursive;
            --navy-primary: #0F172A;
            --blue-accent: #2563EB;
            --bg-white: #FFFFFF;
            --text-gray: #64748B;
            --border-light: #E2E8F0;
            --alert-red: #EF4444;
            --success-green: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-ui); background-color: var(--navy-primary); overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* ================= SMART TYPING HUD ================= */
        .typing-hud {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150%);
            width: 90%; max-width: 400px; z-index: 10000;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 20px;
            padding: 18px 24px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .typing-hud.active { opacity: 1; transform: translate(-50%, 0); }
        .hud-label { font-size: 0.85rem; color: var(--blue-accent); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px;}
        .hud-value { font-size: 1.5rem; font-weight: 700; color: var(--navy-primary); letter-spacing: 2px;}
        @media (min-width: 901px) { .typing-hud { display: none !important; } }

        /* ================= LAYOUT SPLIT SCREEN ================= */
        .layout-wrapper { display: flex; min-height: 100vh; width: 100%; }

        /* ฝั่งรูปภาพ (Desktop) */
        .image-section { flex: 1.4; position: relative; overflow: hidden; }
        .bg-image {
            position: absolute; inset: -5%; width: 110%; height: 110%;
            background: url('pexels-apartment-2179337.jpg') center/cover no-repeat;
            background-color: var(--navy-primary);
            animation: slowZoom 40s infinite alternate ease-in-out;
        }
        .bg-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(15,23,42,0.8), transparent); z-index: 1; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* ฝั่งฟอร์ม */
        .form-section { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            background: var(--bg-white); padding: 40px; position: relative; z-index: 10;
            box-shadow: -15px 0 50px rgba(0,0,0,0.15);
        }

        .form-container { width: 100%; max-width: 420px; animation: fadeUp 0.8s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo { font-family: var(--font-logo); font-size: clamp(2.2rem, 4vw, 2.5rem); color: var(--navy-primary); margin-bottom: 5px; line-height: 1.1; }
        .brand-logo span { color: var(--blue-accent); }
        .subtitle { color: var(--text-gray); font-size: 1.05rem; margin-bottom: 40px; font-weight: 600; letter-spacing: 0.5px;}

        /* --- Input Custom Design --- */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; stroke: var(--text-gray); stroke-width: 2; fill: none; transition: 0.3s; z-index: 2;}
        
        .input-control { 
            width: 100%; padding: 22px 55px 22px 56px; /* เผื่อที่ให้ Counter ด้านขวา */
            background: #F8FAFC; border: 2px solid var(--border-light); 
            border-radius: 16px; font-family: var(--font-ui); font-size: 1.15rem; color: var(--navy-primary); 
            outline: none; transition: 0.3s; font-weight: 600; letter-spacing: 1px;
        }
        .input-control:focus { border-color: var(--blue-accent); background: #FFF; box-shadow: 0 0 0 5px rgba(37,99,235,0.1); }
        .input-control:focus ~ .input-icon { stroke: var(--blue-accent); }

        .floating-label { position: absolute; left: 56px; top: 50%; transform: translateY(-50%); color: var(--text-gray); transition: 0.3s; pointer-events: none; font-weight: 500;}
        .input-control:focus ~ .floating-label, .input-control:not(:placeholder-shown) ~ .floating-label { 
            top: 0; left: 20px; font-size: 0.8rem; font-weight: 800; color: var(--blue-accent); background: #FFF; padding: 0 8px; letter-spacing: 0;
        }

        /* ตัวนับอักษร (Counter) */
        .char-counter {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            font-size: 0.85rem; font-weight: 700; color: var(--text-gray);
            transition: 0.3s; pointer-events: none;
        }

        .btn-submit {
            width: 100%; padding: 20px; background: var(--navy-primary); color: #FFF; border: none; 
            border-radius: 16px; font-size: 1.15rem; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 30px;
            box-shadow: 0 10px 25px rgba(15,23,42,0.15); font-family: var(--font-ui); letter-spacing: 0.5px;
        }
        .btn-submit:hover { background: var(--blue-accent); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37,99,235,0.25); }
        .btn-submit svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        /* ================= MOBILE DESIGN ================= */
        @media (max-width: 900px) {
            .image-section { position: absolute; inset: 0; flex: none; width: 100%; height: 100%; }
            .bg-overlay { background: linear-gradient(to bottom, rgba(15,23,42,0.2), rgba(15,23,42,0.8)); }
            
            .form-section { 
                background: transparent; padding: 20px; align-items: flex-end; 
                height: 100vh; width: 100%; box-shadow: none;
            }
            .form-container { 
                background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
                padding: 40px 30px; border-radius: 35px 35px 20px 20px;
                box-shadow: 0 -15px 40px rgba(0,0,0,0.3); width: 100%; max-width: 500px;
            }
        }

        /* Toast */
        #smart-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #FFF; padding: 16px 30px; border-radius: 50px; z-index: 10001;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 700; border: 1px solid var(--border-light); color: var(--navy-primary);
        }
        #smart-toast.show { top: 30px; }
        .toast-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 2.5; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="smart-toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

    <div class="typing-hud" id="typing-hud">
        <div class="hud-label" id="hud-label">กำลังระบุ</div>
        <div class="hud-value" id="hud-value">...</div>
    </div>

    <div class="layout-wrapper">
        <div class="image-section">
            <div class="bg-image"></div>
            <div class="bg-overlay"></div>
        </div>

        <div class="form-section">
            <div class="form-container" id="login-box">
                <h1 class="brand-logo">PRESTIGE<span>HALL</span></h1>
                <p class="subtitle">ระบบบริการลูกบ้านออนไลน์</p>

                <form id="tenant-login-form">
                    
                    <div class="input-group" id="grp-cid">
                        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="tel" id="citizen_id" class="input-control" placeholder=" " required maxlength="13" inputmode="numeric" autocomplete="off">
                        <label class="floating-label">เลขบัตรประชาชน 13 หลัก</label>
                        <div class="char-counter" id="count-cid">0/13</div>
                    </div>

                    <div class="input-group" id="grp-phone">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <input type="tel" id="phone_number" class="input-control" placeholder=" " required maxlength="10" inputmode="numeric" autocomplete="off">
                        <label class="floating-label">เบอร์โทรศัพท์ 10 หลัก</label>
                        <div class="char-counter" id="count-phone">0/10</div>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-submit">
                        เข้าสู่ระบบลูกบ้าน
                        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://vnlqxtxifgchrouongpu.supabase.co/rest/v1';
        const SB_KEY = 'sb_publishable_jBw7w_gyrLx7B0oSHAtWOw_nVTHTzxl';

        function showToast(msg, type = 'error') {
            const t = document.getElementById('smart-toast');
            const icon = document.getElementById('toast-icon');
            t.style.borderColor = type === 'success' ? 'var(--success-green)' : 'var(--alert-red)';
            icon.style.color = type === 'success' ? 'var(--success-green)' : 'var(--alert-red)';
            icon.innerHTML = type === 'success' 
                ? `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>` 
                : `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ==============================
        // ระบบนับตัวอักษร (Counter)
        // ==============================
        function setupInputCounter(inputId, counterId, maxLen) {
            const input = document.getElementById(inputId);
            const counter = document.getElementById(counterId);
            
            input.addEventListener('input', () => {
                // บังคับพิมพ์ได้เฉพาะตัวเลข
                input.value = input.value.replace(/[^0-9]/g, '');
                
                const len = input.value.length;
                counter.innerText = `${len}/${maxLen}`;
                
                if (len === maxLen) {
                    counter.style.color = 'var(--success-green)';
                } else {
                    counter.style.color = 'var(--text-gray)';
                }
            });
        }
        setupInputCounter('citizen_id', 'count-cid', 13);
        setupInputCounter('phone_number', 'count-phone', 10);

        // ==============================
        // ระบบ Typing HUD บนมือถือ
        // ==============================
        const hud = document.getElementById('typing-hud');
        const hudVal = document.getElementById('hud-value');
        const hudLab = document.getElementById('hud-label');

        function setupHud(id, label) {
            const el = document.getElementById(id);
            el.addEventListener('focus', () => { hudLab.innerText = label; hud.classList.add('active'); updateHud(el); });
            el.addEventListener('input', () => updateHud(el));
            el.addEventListener('blur', () => hud.classList.remove('active'));
        }

        function updateHud(el) {
            let val = el.value;
            // จัดรูปแบบให้ดูอ่านง่ายขึ้นตอนพิมพ์
            if(el.id === 'citizen_id' && val.length > 0) {
                val = val.replace(/(\d{1})(\d{4})(\d{5})(\d{2})(\d{1})/, "$1-$2-$3-$4-$5");
            } else if(el.id === 'phone_number' && val.length > 0) {
                val = val.replace(/(\d{3})(\d{3})(\d{4})/, "$1-$2-$3");
            }
            hudVal.innerText = val || '...';
        }

        setupHud('citizen_id', 'เลขบัตรประชาชน');
        setupHud('phone_number', 'เบอร์โทรศัพท์');

        // ==============================
        // ระบบ Login เข้าสู่ฐานข้อมูล
        // ==============================
        document.getElementById('tenant-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const cid = document.getElementById('citizen_id').value.trim();
            const phone = document.getElementById('phone_number').value.trim();

            if(cid.length !== 13) { showToast("กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก", "error"); return; }
            if(phone.length !== 10) { showToast("กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก", "error"); return; }

            btn.disabled = true;
            btn.innerHTML = `<span>กำลังตรวจสอบข้อมูล...</span>`;

            try {
                // ดึงข้อมูลลูกบ้าน โดยเช็คว่า citizen_id และ phone_number ตรงกัน และสถานะต้อง ACTIVE
                const res = await fetch(`${SB_URL}/dorm_tenants?citizen_id=eq.${cid}&phone_number=eq.${phone}&status=eq.ACTIVE&select=*`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });

                if(!res.ok) throw new Error("การเชื่อมต่อมีปัญหา");
                const data = await res.json();

                if (data.length > 0) {
                    const user = data[0];
                    
                    // สร้าง Session ฝั่งลูกบ้าน
                    const session = {
                        id: user.id,
                        room_number: user.room_number,
                        full_name: user.full_name,
                        loggedInAt: new Date().getTime(),
                        expiresIn: 30 * 24 * 60 * 60 * 1000 // ให้ลูกบ้านล็อกอินค้างได้ 30 วัน
                    };
                    
                    localStorage.setItem('tenant_user_data', JSON.stringify(session));
                    
                    showToast(`ยินดีต้อนรับ ห้อง ${user.room_number}`, "success");
                    btn.style.background = "var(--success-green)";
                    btn.innerHTML = `<span>เข้าสู่ระบบสำเร็จ!</span>`;
                    
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    document.getElementById('login-box').classList.add('shake');
                    setTimeout(() => document.getElementById('login-box').classList.remove('shake'), 400);
                    throw new Error("ข้อมูลไม่ถูกต้อง หรือคุณไม่ได้อยู่ในสถานะผู้เช่า");
                }
            } catch (err) {
                showToast(err.message, "error");
                btn.disabled = false;
                btn.innerHTML = `เข้าสู่ระบบลูกบ้าน <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
            }
        });
    </script>
</body>
</html>
